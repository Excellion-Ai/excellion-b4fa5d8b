    <!-- Google Analytics - Load only after user interaction or 5s delay -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Load GA only after idle or user interaction
      if (typeof window !== 'undefined') {
        var gaLoaded = false;
        function loadGA() {
          if (gaLoaded) return;
          gaLoaded = true;
          gtag('js', new Date());
          gtag('config', 'AW-17764146565');
          var script = document.createElement('script');
          script.src = 'https://www.googletagmanager.com/gtag/js?id=AW-17764146565';
          script.async = true;
          document.head.appendChild(script);
        }
        // Use requestIdleCallback for better performance, fallback to 5s timeout
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGA, { timeout: 5000 });
        } else {
          setTimeout(loadGA, 5000);
        }
        // Also load on first user interaction
        ['click', 'scroll', 'keydown', 'touchstart'].forEach(function(e) {
          document.addEventListener(e, loadGA, { once: true, passive: true });
        });
      }
    </script>
